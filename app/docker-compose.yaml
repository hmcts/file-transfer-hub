services:
  ftps:
    build: .
    restart: unless-stopped

    depends_on:
      - sftp-target
      - sftp-target-2

    environment:
      FTPS_PUBLIC_IP: "${FTPS_PUBLIC_IP:-127.0.0.1}"
      FTPS_LOCAL_USER: "${FTPS_LOCAL_USER:-ftpssvc}"
      FTPS_LOCAL_PASSWORD: "${FTPS_LOCAL_PASSWORD:-}"
      FTPS_CERTIFICATE_PATH: "${FTPS_CERTIFICATE_PATH:-/certs/ftps.pem}"
      FTPS_CERTIFICATE_PEM: "${FTPS_CERTIFICATE_PEM:-}"
      FTPS_CERTIFICATE_KEY_PEM: "${FTPS_CERTIFICATE_KEY_PEM:-}"
      FTPS_CERTIFICATE_PKCS12_PASSWORD: "${FTPS_CERTIFICATE_PKCS12_PASSWORD:-}"
      FTPS_PASSIVE_MIN_PORT: "${FTPS_PASSIVE_MIN_PORT:-1024}"
      FTPS_PASSIVE_MAX_PORT: "${FTPS_PASSIVE_MAX_PORT:-1034}"
      FTPS_ENABLE_STORAGE_FORWARD: "${FTPS_ENABLE_STORAGE_FORWARD:-true}"
      FTPS_FORWARD_INTERVAL_SECONDS: "${FTPS_FORWARD_INTERVAL_SECONDS:-2}"
      FTPS_FORWARD_DELETE_AFTER: "${FTPS_FORWARD_DELETE_AFTER:-false}"
      FTPS_FORWARD_TARGET_COUNT: "${FTPS_FORWARD_TARGET_COUNT:-2}"
      FTPS_FORWARD_TARGET_0_NAME: "${FTPS_FORWARD_TARGET_0_NAME:-primary}"
      FTPS_FORWARD_TARGET_0_HOST: "${FTPS_FORWARD_TARGET_0_HOST:-sftp-target}"
      FTPS_FORWARD_TARGET_0_PORT: "${FTPS_FORWARD_TARGET_0_PORT:-22}"
      FTPS_FORWARD_TARGET_0_USERNAME: "${FTPS_FORWARD_TARGET_0_USERNAME:-sftpuser}"
      FTPS_FORWARD_TARGET_0_PASSWORD: "${FTPS_FORWARD_TARGET_0_PASSWORD:-sftppass}"
      FTPS_FORWARD_TARGET_0_REMOTE_DIR: "${FTPS_FORWARD_TARGET_0_REMOTE_DIR:-dropoff}"
      FTPS_FORWARD_TARGET_1_NAME: "${FTPS_FORWARD_TARGET_1_NAME:-secondary}"
      FTPS_FORWARD_TARGET_1_HOST: "${FTPS_FORWARD_TARGET_1_HOST:-sftp-target-2}"
      FTPS_FORWARD_TARGET_1_PORT: "${FTPS_FORWARD_TARGET_1_PORT:-22}"
      FTPS_FORWARD_TARGET_1_USERNAME: "${FTPS_FORWARD_TARGET_1_USERNAME:-sftpuser2}"
      FTPS_FORWARD_TARGET_1_PASSWORD: "${FTPS_FORWARD_TARGET_1_PASSWORD:-sftppass2}"
      FTPS_FORWARD_TARGET_1_REMOTE_DIR: "${FTPS_FORWARD_TARGET_1_REMOTE_DIR:-replica}"

    ports:
      - "990:990"
      - "1024-1034:1024-1034"

    volumes:
      - type: tmpfs
        target: /srv/ftps
      - ${FTPS_CERTS_DIR:-./certs}:/certs:ro
      - type: tmpfs
        target: /var/log/proftpd

    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: >
        sh -c '
          echo | openssl s_client -connect 127.0.0.1:990 -tls1_2 2>/dev/null | grep -q CONNECTED
        '
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  sftp-target:
    image: atmoz/sftp:alpine
    command: ${SFTP_TARGET_0_USER:-sftpuser}:${SFTP_TARGET_0_PASSWORD:-sftppass}:1001::${SFTP_TARGET_0_REMOTE_DIR:-dropoff}

  sftp-target-2:
    image: atmoz/sftp:alpine
    command: ${SFTP_TARGET_1_USER:-sftpuser2}:${SFTP_TARGET_1_PASSWORD:-sftppass2}:1001::${SFTP_TARGET_1_REMOTE_DIR:-replica}