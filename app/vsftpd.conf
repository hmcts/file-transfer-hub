# ═══════════════════════════════════════════════════════════════════
#  vsftpd – Implicit FTPS configuration
#  Meets HMCTS / 3rd-party technical requirements
#
#  NOTE: TLS settings in this file are overridden at runtime by
#  entrypoint.sh when DEV_MODE=true (plain FTP on port 990,
#  no certificates required).
# ═══════════════════════════════════════════════════════════════════

# ── Daemon / listener ──────────────────────────────────────────────
listen=YES
listen_ipv6=NO
listen_port=990

# ── Implicit TLS (port 990 standard) ──────────────────────────────
ssl_enable=YES
implicit_ssl=YES
allow_anon_ssl=NO
force_local_data_ssl=YES
force_local_logins_ssl=YES

# ── TLS ≥ 1.2 only ────────────────────────────────────────────────
ssl_tlsv1=NO
ssl_tlsv1_1=NO
ssl_tlsv1_2=YES

# ── Cipher hardening (TLS 1.2+ strong ciphers only) ───────────────
ssl_ciphers=ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256

# ── Disable TLS session reuse (required by 3rd party) ─────────────
require_ssl_reuse=NO

# ── Certificate keypair (MUST be separate from server SSH key) ─────
rsa_cert_file=/etc/vsftpd/certs/fullchain.pem
rsa_private_key_file=/etc/vsftpd/certs/privkey.pem

# ── User / access ─────────────────────────────────────────────────
anonymous_enable=NO
local_enable=YES
write_enable=YES
local_umask=022
chroot_local_user=YES
allow_writeable_chroot=YES
user_sub_token=$USER
local_root=/home/$USER/ftp

# ── Passive mode – mandatory data port range 10242-11034 ──────────
pasv_enable=YES
pasv_min_port=10242
pasv_max_port=11034
# Set to your static public IP or lowercase FQDN at runtime
# (injected by entrypoint.sh via PASV_ADDRESS env var)
pasv_addr_resolve=YES
pasv_address=PLACEHOLDER_PASV_ADDRESS

# ── Logging ────────────────────────────────────────────────────────
xferlog_enable=YES
xferlog_std_format=NO
log_ftp_protocol=YES
vsftpd_log_file=/var/log/vsftpd/vsftpd.log

# ─��� Misc hardening ────────────────────────────────────────────────
seccomp_sandbox=NO
tcp_wrappers=NO
pam_service_name=vsftpd
dirmessage_enable=YES
use_localtime=YES
connect_from_port_20=NO
idle_session_timeout=600
data_connection_timeout=120