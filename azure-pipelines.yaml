trigger:
  batch: true
  branches:
    include:
      - main

pr:
  - main

resources:
  repositories:
    - repository: cnp-azuredevops-libraries
      type: github
      ref: refs/heads/master
      name: hmcts/cnp-azuredevops-libraries
      endpoint: "hmcts"

parameters:
  - name: overrideAction
    type: string
    default: plan
    values:
      - plan
      - apply
      - destroy
  - name: environment_components
    type: object
    default:
      - deployment: "nonprod_core"
        environment: "nonprod"
        component: "core"
        service_connection: "HMCTS-HUB-NONPROD-INTSVC"
        dependsOn: "TerraformPrecheck"
      - deployment: "nonprod_container_app"
        environment: "nonprod"
        component: "container-app"
        service_connection: "HMCTS-HUB-NONPROD-INTSVC"
        dependsOn:
          - "nonprod_core"
          - "AppBuildPublish"
#      - deployment: "prod_core"
#        environment: "prod"
#        component: "core"
#        service_connection: "HMCTS-HUB-PROD-INTSVC"
#        dependsOn: "nonprod_core"
#      - deployment: "prod_container_app"
#        environment: "prod"
#        component: "container-app"
#        service_connection: "HMCTS-HUB-PROD-INTSVC"
#        dependsOn:
#          - "prod_core"
#          - "nonprod_container_app"

variables:
  - name: timeoutInMinutes
    value: 60
  - name: agentImage
    value: ubuntu-latest
  - name: product
    value: hub
  - name: terraformInitSubscription
    value: 04d27a32-7a07-48b3-95b8-3c8691e1a263
  - template: vars/input-variables.yaml@cnp-azuredevops-libraries
  - name: imageRepository
    value: file-transfer-hub/ftps-server

stages:
  - stage: TerraformPrecheck
    dependsOn: []
    jobs:
      - job:
        pool:
          vmImage: ${{ variables.agentImage }}
        steps:
          - template: steps/terraform-precheck.yaml@cnp-azuredevops-libraries
            parameters:
              keyvaultName: "infra-vault-nonprod"
              keyvaultSecret: "azure-devops-sp-token"
              serviceConnection: "azurerm-sandbox"
              overrideAction: ${{ parameters.overrideAction }}

  - stage: AppBuildPublish
    displayName: "App Build & Publish"
    dependsOn: []
    jobs:
      - job: BuildAndPublish
        pool:
          vmImage: ${{ variables.agentImage }}
        steps:
          - task: AzureCLI@2
            displayName: "Build and push Docker image to ACR (az acr build)"
            inputs:
              azureSubscription: DCD-CNP-Prod
              scriptType: bash
              scriptLocation: inlineScript
              workingDirectory: $(System.DefaultWorkingDirectory)/app
              inlineScript: |
                echo "Starting ACR build for $(imageRepository)"

                # Determine the correct branch name
                if [ "$(Build.Reason)" = "PullRequest" ]; then
                  BRANCH_NAME="$(System.PullRequest.SourceBranch)"
                else
                  BRANCH_NAME="$(Build.SourceBranch)"
                fi

                # Remove refs/heads/ prefix if present
                BRANCH_NAME="${BRANCH_NAME#refs/heads/}"

                # Replace / with - for valid Docker tag names
                BRANCH_NAME="${BRANCH_NAME//\//-}"

                echo "Using branch name: $BRANCH_NAME"

                az acr build --registry hmctsprod \
                  -t $(imageRepository):$(Build.BuildId) \
                  -t $(imageRepository):$BRANCH_NAME \
                  -t $(imageRepository):$BRANCH_NAME-$(Build.BuildId) \
                  .

  - ${{ each deployment in parameters.environment_components }}:
      - stage: ${{ deployment.deployment }}
        dependsOn: ${{ deployment.dependsOn }}
        ${{ if eq(deployment.component, 'container-app') }}:
          variables:
            - name: log_analytics_workspace_id
              value: $[stageDependencies.${{ deployment.environment
                }}_core.TerraformPlanApply.outputs['terraformOutputs.log_analytics_workspace_id']]
            - name: container_apps_subnet_id
              value: $[stageDependencies.${{ deployment.environment
                }}_core.TerraformPlanApply.outputs['terraformOutputs.container_apps_subnet_id']]
        jobs:
          - job: TerraformPlanApply
            pool: hmcts-cftptl-agent-pool
            timeoutInMinutes: ${{ variables.timeoutInMinutes }}
            steps:
              - template: steps/terraform.yaml@cnp-azuredevops-libraries
                parameters:
                  overrideAction: ${{ parameters.overrideAction }}
                  environment: ${{ deployment.environment}}
                  component: ${{ deployment.component }}
                  serviceConnection: ${{ deployment.service_connection }}
                  product: ${{ variables.product }}
                  terraformInitSubscription: ${{ variables.terraformInitSubscription }}
                  ${{ if eq(deployment.environment, 'nonprod') }}:
                    backendResourceGroupName: azure-control-stg-rg
                  ${{ if eq(deployment.component, 'container-app') }}:
                    planCommandOptions: >-
                      -var
                      "log_analytics_workspace_id=$(log_analytics_workspace_id)"
                      -var
                      "container_apps_subnet_id=$(container_apps_subnet_id)"
                      -var
                      "container_app_image=hmctsprod.azurecr.io/$(imageRepository):$(Build.BuildId)"
              - ${{ if eq(deployment.component, 'core') }}:
                  - task: AzureCLI@2
                    name: terraformOutputs
                    displayName: "Capture Terraform Outputs"
                    inputs:
                      azureSubscription: ${{ deployment.service_connection }}
                      scriptType: bash
                      scriptLocation: inlineScript
                      addSpnToEnvironment: true
                      inlineScript: |
                        set -euo pipefail

                        WORKDIR="$(System.DefaultWorkingDirectory)"
                        if [ -d "$WORKDIR/file-transfer-hub" ]; then
                          REPO_ROOT="$WORKDIR/file-transfer-hub"
                        else
                          REPO_ROOT="$WORKDIR"
                        fi

                        cd "$REPO_ROOT/components/core"

                        export ARM_CLIENT_ID=$servicePrincipalId
                        export ARM_CLIENT_SECRET=$servicePrincipalKey
                        export ARM_TENANT_ID=$tenantId
                        export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                        LOG_ANALYTICS_ID=$(terraform output -raw log_analytics_workspace_id)
                        SUBNET_ID=$(terraform output -raw container_apps_subnet_id)
                        KEY_VAULT_NAME=$(terraform output -raw key_vault_name)

                        case "$LOG_ANALYTICS_ID" in
                          /subscriptions/*) ;;
                          *) echo "Unexpected log_analytics_workspace_id output: $LOG_ANALYTICS_ID" >&2; exit 1 ;;
                        esac

                        case "$SUBNET_ID" in
                          /subscriptions/*) ;;
                          *) echo "Unexpected container_apps_subnet_id output: $SUBNET_ID" >&2; exit 1 ;;
                        esac

                        if [ -z "$KEY_VAULT_NAME" ]; then
                          echo "key_vault_name output is empty" >&2
                          exit 1
                        fi

                        echo "##vso[task.setvariable variable=log_analytics_workspace_id;isOutput=true]$LOG_ANALYTICS_ID"
                        echo "##vso[task.setvariable variable=container_apps_subnet_id;isOutput=true]$SUBNET_ID"
                        echo "##vso[task.setvariable variable=key_vault_name;isOutput=true]$KEY_VAULT_NAME"

              - ${{ if eq(deployment.component, 'container-app') }}:
                  - task: AzureCLI@2
                    name: terraformOutputs
                    displayName: "Capture Terraform Outputs"
                    inputs:
                      azureSubscription: ${{ deployment.service_connection }}
                      scriptType: bash
                      scriptLocation: inlineScript
                      addSpnToEnvironment: true
                      inlineScript: |
                        set -euo pipefail

                        WORKDIR="$(System.DefaultWorkingDirectory)"
                        if [ -d "$WORKDIR/file-transfer-hub" ]; then
                          REPO_ROOT="$WORKDIR/file-transfer-hub"
                        else
                          REPO_ROOT="$WORKDIR"
                        fi

                        cd "$REPO_ROOT/components/container-app"

                        export ARM_CLIENT_ID=$servicePrincipalId
                        export ARM_CLIENT_SECRET=$servicePrincipalKey
                        export ARM_TENANT_ID=$tenantId
                        export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                        FTPS_CONTAINER_APP_FQDN=$(terraform output -raw ftps_container_app_fqdn)
                        FTPS_CONTAINER_APP_ID=$(terraform output -raw ftps_container_app_id)

                        if [ -z "$FTPS_CONTAINER_APP_FQDN" ]; then
                          echo "ftps_container_app_fqdn output is empty" >&2
                          exit 1
                        fi

                        case "$FTPS_CONTAINER_APP_ID" in
                          /subscriptions/*) ;;
                          *) echo "Unexpected ftps_container_app_id output: $FTPS_CONTAINER_APP_ID" >&2; exit 1 ;;
                        esac

                        echo "##vso[task.setvariable variable=ftps_container_app_fqdn;isOutput=true]$FTPS_CONTAINER_APP_FQDN"
                        echo "##vso[task.setvariable variable=ftps_container_app_id;isOutput=true]$FTPS_CONTAINER_APP_ID"

  - stage: nonprod_ftps_smoke
    displayName: "Nonprod FTPS Smoke"
    dependsOn:
      - nonprod_core
      - nonprod_container_app
    condition: and(succeeded(), eq('${{ parameters.overrideAction }}', 'plan'))
    variables:
      - name: key_vault_name
        value: $[
          stageDependencies.nonprod_core.TerraformPlanApply.outputs['terraformOutputs.key_vault_name']
          ]
      - name: ftps_container_app_fqdn
        value: $[
          stageDependencies.nonprod_container_app.TerraformPlanApply.outputs['terraformOutputs.ftps_container_app_fqdn']
          ]
      - name: ftps_container_app_id
        value: $[
          stageDependencies.nonprod_container_app.TerraformPlanApply.outputs['terraformOutputs.ftps_container_app_id']
          ]
    jobs:
      - job: AdvisorySmokeTest
        displayName: "Advisory FTPS Smoke Test"
        pool: hmcts-cftptl-agent-pool
        timeoutInMinutes: 15
        steps:
          - task: AzureCLI@2
            displayName: "Run FTPS smoke tests"
            continueOnError: true
            inputs:
              azureSubscription: HMCTS-HUB-NONPROD-INTSVC
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                WORKDIR="$(System.DefaultWorkingDirectory)"
                if [ -d "$WORKDIR/file-transfer-hub" ]; then
                  REPO_ROOT="$WORKDIR/file-transfer-hub"
                else
                  REPO_ROOT="$WORKDIR"
                fi

                cd "$REPO_ROOT/scripts/ftps_smoke"

                python3 -m venv .venv
                source .venv/bin/activate

                python -m pip install --upgrade pip
                python -m pip install -r requirements.txt

                mkdir -p "$(Common.TestResultsDirectory)"

                pytest -v -rA -s \
                  --junitxml "$(Common.TestResultsDirectory)/ftps-smoke.xml"
            env:
              FTPS_SMOKE_FQDN: $(ftps_container_app_fqdn)
              FTPS_SMOKE_CONTAINER_APP_ID: $(ftps_container_app_id)
              FTPS_SMOKE_KEY_VAULT_NAME: $(key_vault_name)
          - task: PublishTestResults@2
            displayName: "Publish FTPS smoke test results"
            condition: always()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: "$(Common.TestResultsDirectory)/ftps-smoke.xml"
              testRunTitle: "Nonprod FTPS smoke"
              failTaskOnFailedTests: false
              publishRunAttachments: true

